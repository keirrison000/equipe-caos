    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
    <meta charset="UTF-8">
    <title>Login Premium</title>
    <link rel="stylesheet" href="login.css">
    </head>

    <body>

    <header>
        <div class="logo">Equipe Caos</div>
        <div class="nav">Login</div>
    </header>

    <main>
        <div class="login-container">
        <h2>Entrar</h2>

        <form>
            <div class="input-group">
            <label>Email</label>
            <input type="email" placeholder="seu@email.com" required>
            </div>

            <div class="input-group">
            <label>Senha</label>
            <input type="password" placeholder="••••••••" required>
            </div>

            <button type="submit" > <a href="index.html"></a>Entrar</button>
        </form>

        <div class="extra">
            <p>Não tem conta? <a href="#">Criar agora</a></p>
        </div>
        </div>
    </main>

    <footer>
        © 2026 GreenApp — Interface Premium
    </footer>

    </body>
    </html>
